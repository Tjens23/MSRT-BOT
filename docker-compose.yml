services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: msrt-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: msrtbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Hyg57aff}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    networks:
      - bot-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d msrtbot']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Discord Bot Application
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msrt-bot
    restart: unless-stopped
    environment:
      # Database connection
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: msrtbot
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-Hyg57aff}

      # Discord bot token (set this in your .env file)
      DISCORD_TOKEN: ${DISCORD_TOKEN}

      OWNER_ID: ${OWNER_ID}
      # Bot owners (space-separated Discord user IDs)
      OWNERS: ${OWNERS}
      GUILD_ID: ${GUILD_ID:-1019121062312673291}
      MILSIM_UNIT_ID: ${MILSIM_UNIT_ID}
      MILSIM_VOTE_SLUG: ${MILSIM_VOTE_SLUG}
      VOTE_CHANNEL_ID: ${VOTE_CHANNEL_ID}
      VOTE_REMINDER_ROLE: ${VOTE_REMINDER_ROLE}
      ENLISTMENT_PARENT_ID: 1020138400231211008
      SUPPORT_PARENT_ID: 1476992535862837581
      HR_PARENT_ID: 1020936334975713330
      STAFF_PARENT_ID: 1049912971054305290
      LOA_PARENT_ID: 1050267397396889620
      TRANSCRIPTS_CHANNEL_ID: 1285700998215630910
      LAVALINK_HOST: lavalink
      LAVALINK_PORT: 2333
      LAVALINK_PASSWORD: youshallnotpass
      LAVALINK_SECURE: 'false'
      env:
        ./.env
      # Other environment variables
      NODE_ENV: production
    volumes:
      - bot_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    networks:
      - bot-network

  # Lavalink Audio Server
  lavalink:
    image: openjdk:17.0.1-jdk-slim
    container_name: msrt-bot-lavalink
    restart: unless-stopped
    working_dir: /app
    command: java -jar Lavalink.jar
    volumes:
      - ./Lavalink.jar:/app/Lavalink.jar:ro
      - ./application.yaml:/app/application.yml:ro
    ports:
      - '2333:2333'
    networks:
      - bot-network
    healthcheck:
      test: ['CMD-SHELL', "timeout 2 bash -c '</dev/tcp/localhost/2333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  bot_logs:
    driver: local

networks:
  bot-network:
    driver: bridge
