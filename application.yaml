server:
    port: 2333
    address: 0.0.0.0
    http2:
        enabled: false

plugins:
    youtube:
        enabled: true
        allowSearch: true
        allowDirectVideoIds: true
        allowDirectPlaylistIds: true
        clients:
            - ANDROID_MUSIC
            - ANDROID_TESTSUITE
            - WEB
            - TVHTML5EMBEDDED
        # OAuth is required for most videos now. To set up:
        # 1. Run: docker run ghcr.io/lavalink-devs/youtube-source:oauth
        # 2. Follow Google sign-in in browser
        # 3. Copy refreshToken below
        # oauth:
        #     enabled: true
        #     refreshToken: "YOUR_REFRESH_TOKEN_HERE"

lavalink:
    plugins:
        - dependency: "dev.lavalink.youtube:youtube-plugin:1.12.0"
          repository: "https://maven.lavalink.dev/releases"
    server:
        password: "youshallnotpass"
        sources:
            youtube: false
            bandcamp: true
            soundcloud: true
            twitch: true
            vimeo: true
            nico: true
            http: true
            local: false
        filters:
            volume: true
            equalizer: true
            karaoke: true
            timescale: true
            tremolo: true
            vibrato: true
            distortion: true
            rotation: true
            channelMix: true
            lowPass: true
        bufferDurationMs: 400
        frameBufferDurationMs: 5000
        opusEncodingQuality: 10
        resamplingQuality: LOW
        trackStuckThresholdMs: 10000
        useSeekGhosting: true
        playerUpdateInterval: 5
        soundcloudSearchEnabled: true
        gc-warnings: true

metrics:
    prometheus:
        enabled: false
        endpoint: /metrics

logging:
    file:
        path: ./logs/
    level:
        root: INFO
        lavalink: INFO
    request:
        enabled: true
        includeClientInfo: true
        includeHeaders: false
        includeQueryString: true
        includePayload: true
        maxPayloadLength: 10000
    logback:
        rollingpolicy:
            max-file-size: 1GB
            max-history: 30
